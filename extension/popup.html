<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: -apple-system, sans-serif; width: 280px; padding: 12px; }
      button { width: 100%; padding: 8px; margin-top: 6px; cursor: pointer; }
      #status { margin-top: 8px; font-size: 12px; color: #555; min-height: 32px; }
      textarea { width: 100%; height: 60px; margin-top: 6px; font-size: 12px; }
    </style>
  </head>
  <body>
    <strong>Librarian Capture</strong>
    <p style="font-size:12px;color:#777;margin:6px 0;">
      Sends the page (or your selection) to the local librarian daemon.
      No processing happens here — that's the point.
    </p>
    <button id="captureSelection">Capture selected text</button>
    <button id="capturePage">Capture whole page text</button>
    <textarea id="manual" placeholder="...or paste/type something to capture manually"></textarea>
    <button id="captureManual">Capture manual text</button>
    <div id="status">idle</div>
    <script src="popup.js"></script>
  </body>
</html>
