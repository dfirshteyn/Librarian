# Librarian — local-first tiered memory daemon
# Docker Compose for Alibaba ECS deployment
#
# Usage:
#   docker compose up -d              # start (uses default config)
#   docker compose -f docker-compose.yml up -d
#
# Environment overrides (create a .env file or set in ECS environment):
#   DASHSCOPE_API_KEY=sk-...          # Qwen API key
#   LLAMA_CPP_URL=http://host:1234/v1 # llama.cpp endpoint (optional)
#   SECRET_KEY_BASE=...               # Phoenix secret (auto-generated if missing)
#   DATABASE_URL=ecto://...           # Postgres (SQLite file used by default)

services:
  librarian:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"   # HTTP (REST API + Dashboard)
      - "4001:4001"   # WebSocket (Chrome extension)
    depends_on:
      llama-cpp:
        condition: service_started
    environment:
      - MIX_ENV=prod
      - PORT=4000
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - LLAMA_CPP_URL=http://llama-cpp:1234/v1
      - EMBED_URL=http://llama-cpp:1235/v1
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-}
      # Database: uses SQLite file by default — mount a volume to persist
      # For Postgres (production), set DATABASE_URL instead
      - DATABASE_URL=${DATABASE_URL:-}
      - RELEASE_NODE=bookworm@127.0.0.1
      - RELEASE_DISTRIBUTION=name
      - RELEASE_COOKIE=librarian_hackathon_2026
    volumes:
      - librarian_data:/app/priv
      - librarian_wal:/app/priv/wal
      - librarian_cold:/app/priv/cold
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3

  # llama.cpp server running Qwen 0.6B Q4_K_M + BGE-M3 embedding model
  # The models directory should contain:
  #   - qwen2.5-0.5b-q4_k_m.gguf  (completion, port 1234)
  #   - bge-m3-q8.gguf (embedding, port 1235) - user-provided GGUF model
  # Downloads are automatic on first run via the init script below.
  llama-cpp:
    image: ghcr.io/ggerganov/llama.cpp:server
    ports:
      - "1234:1234"   # Completion endpoint
      - "1235:1235"   # Embedding endpoint
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-}
    volumes:
      - ./models:/models
      - ./priv/scripts/download_models.sh:/download_models.sh
    command: >
      sh -c "
        /download_models.sh || true &&
        /app/server
        --host 0.0.0.0 --port 1234
        --embedding --embedding-port 1235
        -m /models/qwen2.5-0.5b-q4_k_m.gguf
        -ngl 99 -c 4096
      "
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: all

volumes:
  librarian_data:
  librarian_wal:
  librarian_cold: